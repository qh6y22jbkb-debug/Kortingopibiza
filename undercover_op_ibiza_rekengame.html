<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ibiza-purple:#6B2D8B;--ibiza-pink:#E91E8C;--ibiza-yellow:#FFD700;
  --ibiza-orange:#FF6B35;--ibiza-teal:#00C9B1;--ibiza-dark:#1A0A2E;
  --ibiza-light:#FFF9E6;
}
body{font-family:'Nunito',sans-serif;background:var(--ibiza-dark);color:var(--ibiza-light);min-height:100vh;overflow-x:hidden}
#app{min-height:100vh;position:relative}

.bg-stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}

.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:1rem}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

.neon-title{font-family:'Bangers',cursive;font-size:3.5rem;letter-spacing:3px;text-align:center;
  color:var(--ibiza-yellow);text-shadow:0 0 10px var(--ibiza-yellow),0 0 30px var(--ibiza-orange);
  line-height:1.1}
.neon-subtitle{font-family:'Bangers',cursive;font-size:2rem;color:var(--ibiza-pink);
  text-shadow:0 0 8px var(--ibiza-pink);letter-spacing:2px}

.btn-ibiza{
  font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:2px;
  padding:.6rem 2rem;border:none;border-radius:50px;cursor:pointer;
  transition:transform .15s;display:inline-block;text-decoration:none
}
.btn-ibiza:hover{transform:translateY(-3px) scale(1.04)}
.btn-ibiza:active{transform:scale(.97)}
.btn-easy{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 20px rgba(34,197,94,.4)}
.btn-medium{background:linear-gradient(135deg,var(--ibiza-orange),#e85d04);color:#fff;box-shadow:0 4px 20px rgba(255,107,53,.4)}
.btn-hard{background:linear-gradient(135deg,var(--ibiza-pink),#be185d);color:#fff;box-shadow:0 4px 20px rgba(233,30,140,.4)}
.btn-next{background:linear-gradient(135deg,var(--ibiza-teal),#0097a7);color:#fff;box-shadow:0 4px 20px rgba(0,201,177,.4)}

.btn-white{
  background:#ffffff !important;
  color:#111111 !important;
  border:2px solid #111111 !important;
  box-shadow:0 3px 10px rgba(0,0,0,.4) !important;
}
.btn-white:hover{background:#eeeeee !important}

.card-ibiza{
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);
  border-radius:1.2rem;padding:1.4rem 1.6rem;backdrop-filter:blur(4px);
  box-shadow:0 4px 30px rgba(0,0,0,.4);width:100%;max-width:560px
}

.score-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:560px;margin-bottom:.8rem
}
.score-pill{
  font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:1px;
  background:rgba(255,215,0,.15);border:1.5px solid var(--ibiza-yellow);
  padding:.2rem 1rem;border-radius:50px;color:var(--ibiza-yellow)
}
.q-counter{font-size:.9rem;color:rgba(255,255,255,.6)}

.dots-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin:.4rem 0}
.dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s}
.dot.correct{background:#22c55e;box-shadow:0 0 8px #22c55e}
.dot.wrong{background:var(--ibiza-pink);box-shadow:0 0 8px var(--ibiza-pink)}
.dot.current{background:var(--ibiza-yellow);box-shadow:0 0 8px var(--ibiza-yellow)}

.type-badge{
  display:inline-block;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:.25rem .8rem;border-radius:50px;margin-bottom:.6rem
}
.badge-A{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.4)}
.badge-B{background:rgba(255,215,0,.2);color:var(--ibiza-yellow);border:1px solid rgba(255,215,0,.4)}
.badge-C{background:rgba(233,30,140,.2);color:var(--ibiza-pink);border:1px solid rgba(233,30,140,.4)}

.q-story{font-size:1rem;color:rgba(255,255,255,.8);margin-bottom:.3rem;line-height:1.5}
.q-question{font-family:'Bangers',cursive;font-size:1.5rem;color:#fff;letter-spacing:1px;margin-bottom:1rem}

.ratio-wrap{overflow-x:auto;margin-bottom:1rem;display:flex;justify-content:center}
table.ratio{border-collapse:collapse}
table.ratio th{font-size:.8rem;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;
  letter-spacing:1px;padding:.3rem .5rem;border-right:1px solid rgba(255,255,255,.1)}
table.ratio th:last-child{border-right:none}
table.ratio td{padding:.3rem .4rem;text-align:center;border:1px solid rgba(255,255,255,.1);min-width:70px;font-size:.95rem}
table.ratio input{
  width:68px;text-align:center;background:rgba(255,255,255,.05);
  border:none;border-bottom:2px dashed rgba(255,255,255,.3);
  color:#fff;font-size:.95rem;font-family:'Nunito',sans-serif;
  font-weight:600;padding:.15rem;outline:none;border-radius:0
}
table.ratio input:focus{border-bottom-color:var(--ibiza-yellow)}
table.ratio input.ok{border-bottom-color:#22c55e;color:#4ade80}
table.ratio input.err{border-bottom-color:var(--ibiza-pink);color:var(--ibiza-pink)}

.answer-box{
  background:rgba(0,201,177,.08);border:1.5px dashed var(--ibiza-teal);
  border-radius:.8rem;padding:1rem;margin-bottom:.8rem;text-align:center
}
.answer-box label{font-size:.8rem;color:var(--ibiza-teal);font-weight:700;display:block;margin-bottom:.5rem}
.answer-row{display:flex;align-items:center;justify-content:center;gap:.5rem}
.answer-row input{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);border-radius:.5rem;
  color:#fff;font-size:1.2rem;font-weight:700;font-family:'Nunito',sans-serif;
  padding:.4rem .7rem;width:160px;text-align:center;outline:none
}
.answer-row input:focus{border-color:var(--ibiza-teal)}
.answer-row input.ok{border-color:#22c55e;color:#4ade80}
.answer-row input.err{border-color:var(--ibiza-pink);color:var(--ibiza-pink)}
.unit{font-family:'Bangers',cursive;font-size:1.4rem;color:rgba(255,255,255,.6)}

.hint-box{
  background:rgba(255,215,0,.08);border-left:3px solid var(--ibiza-yellow);
  border-radius:.5rem;padding:.7rem 1rem;margin-bottom:.8rem;font-size:.9rem;
  color:rgba(255,255,255,.8);display:none
}
.hint-box.show{display:block}

.feedback-box{
  border-radius:.8rem;padding:.8rem 1rem;margin-bottom:.8rem;text-align:center;
  font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:1px;display:none
}
.feedback-box.show{display:block}
.feedback-box.good{background:rgba(34,197,94,.2);border:1.5px solid rgba(34,197,94,.4);color:#4ade80}
.feedback-box.warn{background:rgba(255,215,0,.15);border:1.5px solid rgba(255,215,0,.4);color:var(--ibiza-yellow)}
.feedback-box.bad{background:rgba(233,30,140,.15);border:1.5px solid rgba(233,30,140,.4);color:var(--ibiza-pink)}

.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}

.prize-pills{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin:.8rem 0}
.prize-pill{
  font-size:.8rem;font-weight:700;padding:.3rem .8rem;border-radius:50px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2)
}

@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
.pop-in{animation:popIn .35s ease-out}
.shake{animation:shake .4s ease}
.confetti-bit{position:absolute;width:7px;height:7px;border-radius:2px;animation:confettiFall 1.2s ease-out forwards;pointer-events:none}

.end-big{font-family:'Bangers',cursive;font-size:4rem;text-align:center;
  color:var(--ibiza-yellow);text-shadow:0 0 20px var(--ibiza-yellow);line-height:1}

.difficulty-grid{display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:320px}
</style>
</head>
<body>
<div class="bg-stars" id="stars"></div>
<div id="app">

<div id="screen-start" class="screen active">
  <div style="text-align:center;margin-bottom:.5rem">
    <div style="font-size:2.5rem">🌴🦩🌴</div>
    <div class="neon-title">UNDERCOVER<br>OP IBIZA</div>
    <div class="neon-subtitle" style="margin-top:.3rem">REKENEN MET KORTING</div>
  </div>
  <p style="text-align:center;color:rgba(255,255,255,.6);font-size:.9rem;max-width:340px;margin:.8rem 0">
    Nick Slick presenteert: <em>Grijp die Prijs!</em><br>
    Help familie Brokken winnen en ga mee naar Ibiza!
  </p>
  <div class="prize-pills">
    <span class="prize-pill">✈️ Reis naar Ibiza</span>
    <span class="prize-pill">💼 Luxe kofferset</span>
    <span class="prize-pill">📱 Telefoons</span>
    <span class="prize-pill">💰 €25.000!</span>
  </div>
  <p style="color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:.5rem">Kies je niveau:</p>
  <div class="difficulty-grid">
    <button class="btn-ibiza btn-easy" onclick="startGame('easy')">⭐ Puk Brokken</button>
    <button class="btn-ibiza btn-medium" onclick="startGame('medium')">⭐⭐ Ellen Brokken</button>
    <button class="btn-ibiza btn-hard" onclick="startGame('hard')">⭐⭐⭐ Familie Fortuin</button>
  </div>
</div>

<div id="screen-game" class="screen" style="justify-content:flex-start;padding-top:1rem">
  <div class="score-bar">
    <span class="q-counter">Vraag <span id="q-num">1</span> van 8</span>
    <div class="dots-row" id="dots-row"></div>
    <span class="score-pill">🏆 <span id="score-val">0</span> pt</span>
  </div>
  <div class="card-ibiza pop-in" id="question-card" style="position:relative">
    <div id="q-badge" class="type-badge badge-A">Nieuwe prijs</div>
    <div class="q-story" id="q-story"></div>
    <div class="q-question" id="q-question"></div>
    <div class="ratio-wrap"><table class="ratio" id="ratio-table"></table></div>
    <div class="answer-box">
      <label id="answer-label">Jouw antwoord:</label>
      <div class="answer-row">
        <input type="text" id="final-answer" inputmode="decimal" placeholder="..." autocomplete="off">
        <span class="unit" id="answer-unit"></span>
      </div>
    </div>
    <div class="hint-box" id="hint-box"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <div class="btn-row">
      <button id="btn-hint" class="btn-ibiza btn-white" onclick="showHint()">💡 Hint</button>
      <button id="btn-check" class="btn-ibiza btn-white" onclick="checkAnswer()">Controleer ✓</button>
      <button id="btn-next" class="btn-ibiza btn-next" onclick="nextQ()" style="display:none">Volgende →</button>
    </div>
  </div>
</div>

<div id="screen-end" class="screen">
  <div class="end-big" id="end-emoji">🏆</div>
  <div class="neon-title" style="font-size:2.5rem;margin:.4rem 0" id="end-title">Goed gedaan!</div>
  <div class="card-ibiza" style="max-width:400px;text-align:center;margin:.8rem 0">
    <div style="font-size:1.8rem;font-family:'Bangers',cursive;color:var(--ibiza-yellow)" id="end-score"></div>
    <div style="font-size:.85rem;color:rgba(255,255,255,.5);margin-top:.3rem" id="end-sub"></div>
  </div>
  <div class="btn-row">
    <button class="btn-ibiza btn-white" onclick="showScreen('start')">🏠 Terug</button>
    <button class="btn-ibiza btn-white" onclick="startGame(currentDiff)">🔄 Opnieuw</button>
  </div>
</div>

</div>

<script>
const PRODUCTS=[
  {name:'zonnebril voor op het strand',emoji:'🕶️',prices:[30,40,50,60]},
  {name:'flamingo-luchtbed',emoji:'🦩',prices:[40,50,60,80]},
  {name:'vliegticket naar Ibiza',emoji:'✈️',prices:[150,200,250,300]},
  {name:'cocktail aan de pool',emoji:'🍹',prices:[8,10,12,15]},
  {name:'koffer voor de reis',emoji:'💼',prices:[80,100,120,150]},
  {name:'Ibiza-outfit',emoji:'👙',prices:[40,50,60,75]},
  {name:'slippers voor op het terras',emoji:'🩴',prices:[20,25,30,40]},
  {name:'mobiele telefoon',emoji:'📱',prices:[60,80,100,120]},
  {name:'snorkelset',emoji:'🤿',prices:[30,40,50,60]},
  {name:'luxe zonnebrandcrème',emoji:'🧴',prices:[15,20,25,30]},
  {name:'Ibiza-pet van Nick Slick',emoji:'🧢',prices:[20,25,30,40]},
  {name:'horloge voor erbij',emoji:'⌚',prices:[50,80,100,120]},
];
const STORIES_A=[
  (p,pct,emoji)=>`${emoji} In de Ibiza-winkel heeft Nick Slick een korting geregeld van ${pct}% op de ${p}!`,
  (p,pct,emoji)=>`${emoji} Familie Brokken ziet een aanbieding: ${pct}% korting op de ${p}.`,
  (p,pct,emoji)=>`${emoji} Familie Fortuin vindt de ${p} te duur, maar het mag ${pct}% goedkoper.`,
];
const STORIES_B=[
  (p,old,nw,emoji)=>`${emoji} De ${p} kostte €${old},- maar Nick regelt het voor €${nw.toFixed(2).replace('.',',')}. `,
  (p,old,nw,emoji)=>`${emoji} Puk Brokken ziet: de ${p} van €${old},- kost nu €${nw.toFixed(2).replace('.',',')}. `,
];
const STORIES_C=[
  (p,nw,pct,emoji)=>`${emoji} Je betaalt €${nw.toFixed(2).replace('.',',')} voor de ${p}. Dat is na ${pct}% korting.`,
  (p,nw,pct,emoji)=>`${emoji} Ellen Brokken betaalt €${nw.toFixed(2).replace('.',',')} voor de ${p}, met ${pct}% korting.`,
];
const EASY_PCTS=[10,20,25,50];
const MED_PCTS=[10,15,20,25,30,40,50];
const HARD_PCTS=[5,10,12,15,20,25,30,35,40];

let currentDiff='easy',questions=[],qIdx=0,score=0,hintUsed=false,answered=false;

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function r2(n){return Math.round(n*100)/100}

function genQ(diff){
  const prod=pick(PRODUCTS);
  const pcts=diff==='easy'?EASY_PCTS:diff==='medium'?MED_PCTS:HARD_PCTS;
  const pct=pick(pcts);
  const oldPrice=pick(prod.prices);
  const discEur=r2(oldPrice*pct/100);
  const newPrice=r2(oldPrice-discEur);
  const types=['A','B','C'];
  const type=pick(types);
  if(type==='A'){
    const stFn=pick(STORIES_A);
    return{type:'A',badge:'Nieuwe prijs berekenen',badgeClass:'badge-A',
      story:stFn(prod.name,pct,prod.emoji),
      question:`Hoeveel betaalt familie Brokken voor de ${prod.name}?`,
      hint:`${pct}% van €${oldPrice} = de korting in euro. Trek dat af van €${oldPrice}.`,
      cols:buildA(oldPrice,pct,discEur,newPrice,diff),
      finalAnswer:newPrice,unit:'€',label:`Nieuwe prijs: €${newPrice.toFixed(2).replace('.',',')}`
    };
  }else if(type==='B'){
    const stFn=pick(STORIES_B);
    return{type:'B',badge:'Kortingspercentage vinden',badgeClass:'badge-B',
      story:stFn(prod.name,oldPrice,newPrice,prod.emoji),
      question:`Hoeveel procent korting is er op de ${prod.name}?`,
      hint:`De korting in euro is €${oldPrice} - €${newPrice.toFixed(2).replace('.',',')} = €${discEur.toFixed(2).replace('.',',')}. Dat is hoeveel % van €${oldPrice}?`,
      cols:buildB(oldPrice,pct,discEur,newPrice,diff),
      finalAnswer:pct,unit:'%',label:`Korting: ${pct}%`
    };
  }else{
    const payPct=100-pct;
    const stFn=pick(STORIES_C);
    return{type:'C',badge:'Originele prijs terugrekenen',badgeClass:'badge-C',
      story:stFn(prod.name,newPrice,pct,prod.emoji),
      question:`Wat was de originele prijs van de ${prod.name}?`,
      hint:`€${newPrice.toFixed(2).replace('.',',')} is ${payPct}%. Reken terug naar 100%.`,
      cols:buildC(oldPrice,pct,newPrice,diff),
      finalAnswer:oldPrice,unit:'€',label:`Originele prijs: €${oldPrice.toFixed(2).replace('.',',')}`
    };
  }
}

function buildA(old,pct,disc,nw,diff){
  const cols=[{tA:100,bA:old}];
  if(diff==='easy')cols.push({tA:10,bA:r2(old/10)});
  else if(diff==='medium'&&pct%10===0&&pct!==10&&pct!==50)cols.push({tA:10,bA:r2(old/10)});
  else if(diff==='medium'&&pct%5===0)cols.push({tA:5,bA:r2(old/20)});
  else if(diff==='hard'&&pct%10===0&&pct!==10)cols.push({tA:10,bA:r2(old/10)});
  else if(diff==='hard')cols.push({tA:5,bA:r2(old/20)});
  cols.push({tA:pct,bA:disc});
  return cols;
}
function buildB(old,pct,disc,nw,diff){
  const cols=[{tA:100,bA:old}];
  if(diff==='easy')cols.push({tA:1,bA:r2(old/100)});
  else if(pct>=10)cols.push({tA:10,bA:r2(old/10)});
  else cols.push({tA:5,bA:r2(old/20)});
  cols.push({tA:pct,bA:disc});
  return cols;
}
function buildC(old,pct,nw,diff){
  const payPct=100-pct;
  const cols=[{tA:payPct,bA:r2(nw)}];
  if(diff==='easy')cols.push({tA:1,bA:r2(old/100)});
  else if(payPct>=10)cols.push({tA:10,bA:r2(old/10)});
  else cols.push({tA:5,bA:r2(old/20)});
  cols.push({tA:100,bA:old});
  return cols;
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

function startGame(diff){
  currentDiff=diff;
  questions=[];
  for(let i=0;i<8;i++)questions.push(genQ(diff));
  qIdx=0;score=0;
  document.getElementById('score-val').textContent='0';
  const dr=document.getElementById('dots-row');
  dr.innerHTML='';
  for(let i=0;i<8;i++){
    const d=document.createElement('div');
    d.className='dot';d.id='dot-'+i;dr.appendChild(d);
  }
  showScreen('game');
  renderQ();
}

function renderQ(){
  const q=questions[qIdx];
  answered=false;hintUsed=false;
  document.getElementById('q-num').textContent=qIdx+1;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.remove('current');
    if(i===qIdx)d.classList.add('current');
  });
  const badge=document.getElementById('q-badge');
  if(currentDiff==='easy'){
    badge.style.display='inline-block';
    badge.textContent=q.badge;
    badge.className='type-badge '+q.badgeClass;
  }else{
    badge.style.display='none';
  }
  document.getElementById('q-story').textContent=q.story;
  document.getElementById('q-question').textContent=q.question;
  document.getElementById('answer-unit').textContent=q.unit;
  document.getElementById('hint-box').className='hint-box';
  document.getElementById('hint-box').textContent='';
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('feedback-box').textContent='';
  document.getElementById('btn-hint').style.display=currentDiff==='hard'?'none':'inline-block';
  document.getElementById('btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';
  const fa=document.getElementById('final-answer');
  fa.value='';fa.className='';fa.readOnly=false;
  fa.style.borderColor='';fa.style.color='';

  const table=document.getElementById('ratio-table');
  const rowTop=`<tr><th>%</th>${q.cols.map((c,i)=>`<td><input type="text" id="ct${i}" inputmode="decimal" autocomplete="off"></td>`).join('')}</tr>`;
  const rowBot=`<tr><th>€</th>${q.cols.map((c,i)=>`<td><input type="text" id="cb${i}" inputmode="decimal" autocomplete="off"></td>`).join('')}</tr>`;
  table.innerHTML=rowTop+rowBot;

  const card=document.getElementById('question-card');
  card.classList.remove('pop-in');void card.offsetWidth;card.classList.add('pop-in');
}

function showHint(){
  const q=questions[qIdx];
  const hb=document.getElementById('hint-box');
  hb.textContent='💡 Tip van Nick Slick: '+q.hint;
  hb.className='hint-box show';
  hintUsed=true;
}

function parseN(s){if(!s)return NaN;return parseFloat(s.replace(',','.').replace(/\s/g,''))}

function checkAnswer(){
  if(answered)return;
  const q=questions[qIdx];
  let filled=0;
  q.cols.forEach((_,i)=>{
    if((document.getElementById('ct'+i)||{}).value?.trim())filled++;
    if((document.getElementById('cb'+i)||{}).value?.trim())filled++;
  });
  const fb=document.getElementById('feedback-box');
  if(filled<4){
    fb.textContent='Vul minimaal 4 vakjes in de tabel in, Nick Slick wacht!';
    fb.className='feedback-box show warn';return;
  }
  const fa=document.getElementById('final-answer');
  if(!fa.value.trim()){
    fb.textContent='Vul je antwoord in! Familie Brokken rekent op jou!';
    fb.className='feedback-box show warn';return;
  }
  answered=true;
  const val=parseN(fa.value);
  const ok=Math.abs(val-q.finalAnswer)<.11;
  if(ok){
    const pts=hintUsed?2:3;score+=pts;
    document.getElementById('score-val').textContent=score;
    const dot=document.getElementById('dot-'+qIdx);
    dot.classList.remove('current');dot.classList.add('correct');
    fa.className='ok';
    const msgs=['Super! Grijp die prijs!','Geweldig! Nick Slick is trots!','Toppie! Ibiza nadert!','Briljant! Familie Brokken juicht!','Knap! Zelfs Fortuin is onder de indruk!'];
    fb.textContent=`✅ ${pick(msgs)} ${q.label} (+${pts} pt)`;
    fb.className='feedback-box show good';
    spawnConfetti(fb);
    fa.readOnly=true;
    document.getElementById('btn-check').style.display='none';
    document.getElementById('btn-hint').style.display='none';
    document.getElementById('btn-next').style.display='inline-block';
  }else{
    const dot=document.getElementById('dot-'+qIdx);
    dot.classList.remove('current');dot.classList.add('wrong');
    const errs=['Helaas! Puk zegt: "Ik ga stuk..." Probeer het opnieuw!','Niet goed! Ellen wil naar het toilet van de zenuwen. Nog een keer!','Mis! Maar Nick Slick gelooft in jou, probeer het nog eens!'];
    fb.textContent=pick(errs);
    fb.className='feedback-box show bad';
    fa.className='err';
    const card=document.getElementById('question-card');
    card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),400);
    answered=false;setTimeout(()=>fa.focus(),800);
  }
}

function spawnConfetti(container){
  const colors=['#FFD700','#E91E8C','#00C9B1','#FF6B35','#22c55e'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='confetti-bit';
    p.style.left=Math.random()*90+'%';p.style.top='-8px';
    p.style.background=colors[i%colors.length];
    p.style.animationDelay=Math.random()*.3+'s';
    container.style.position='relative';
    container.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}

function nextQ(){
  qIdx++;
  if(qIdx>=8)endGame();else renderQ();
}

function endGame(){
  const max=24,pct=Math.round(score/max*100);
  let emoji,title,msg;
  if(pct>=90){emoji='🏆';title='GRIJP DIE PRIJS!';msg='Jij wint de reis naar Ibiza! Nick Slick applaudisseert!';}
  else if(pct>=70){emoji='🌴';title='Bijna genoeg!';msg='Familie Brokken is trots. Nog een keer en Ibiza is van jou!';}
  else if(pct>=40){emoji='🦩';title='Goed begin!';msg='Puk zegt: "Ik ga stuk, maar positief!" Oefenen en opnieuw!';}
  else{emoji='😅';title='Oops!';msg='Ellen wil naar het toilet. Probeer het nog een keer met hints!';}
  document.getElementById('end-emoji').textContent=emoji;
  document.getElementById('end-title').textContent=title;
  document.getElementById('end-score').textContent=`${score} van 24 punten (${pct}%)`;
  document.getElementById('end-sub').textContent=msg;
  showScreen('end');
}

function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
}
makeStars();
</script>
